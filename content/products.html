<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tokyo Drift - Our Cars</title>
    <link rel="icon" type="image/png" href="../image/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&amp;family=Condiment&amp;family=Black+Ops+One&amp;family=Metal+Mania&amp;family=Poppins:wght@300;400;500;600;700;800&amp;family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/products_inline.css">
</head>
<body>

<video autoplay loop muted playsinline class="video-background">
    <source src="../video/background-vid.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>

<audio id="bgMusic" preload="auto" autoplay></audio>
<div class="music-player" id="musicPlayer">
    <button id="musicPrevBtn" type="button">⏮</button>
    <button id="musicPlayBtn" type="button">🔊</button>
    <button id="musicNextBtn" type="button">⏭</button>
    <div><span id="currentSong">Imagine Dragons - Natural</span></div>
</div>

<button class="back-btn" type="button" onclick="goBack()">← BACK</button>

<header class="compact-header">
    <div class="header-top">
        <div class="logo">
            <img src="../image/logo.png" alt="Tokyo Drift Logo" class="logo-icon">
            <h1>TOKYO DRIFT</h1>
        </div>
        <button class="mobile-menu-btn" type="button" onclick="toggleMobileMenu()">☰</button>
    </div>
    <nav class="compact-nav" id="mainNav"></nav>
</header>

<main style="padding: 20px; max-width: 1400px; margin: 0 auto;">
    <h1 style="border-left: 5px solid #9b30ff; padding-left: 20px;">OUR COLLECTION</h1>
    <div class="filter-bar">
        <div class="filter-buttons">
            <button class="filter-btn active" type="button" onclick="filterCars('All')">ALL</button>
            <button class="filter-btn" type="button" onclick="filterCars('Sport')">SPORT</button>
            <button class="filter-btn" type="button" onclick="filterCars('SUV')">SUV</button>
            <button class="filter-btn" type="button" onclick="filterCars('Sedan')">SEDAN</button>
            <button class="filter-btn" type="button" onclick="filterCars('Luxury')">LUXURY</button>
            <button class="filter-btn" type="button" onclick="filterCars('Electric')">ELECTRIC</button>
        </div>
        <div class="search-sort">
            <select id="sortSelect" onchange="sortCars(this.value)">
                <option value="default">SORT BY: DEFAULT</option>
                <option value="price-low">PRICE: LOW TO HIGH</option>
                <option value="price-high">PRICE: HIGH TO LOW</option>
                <option value="name">NAME: A TO Z</option>
                <option value="popular">MOST POPULAR</option>
            </select>
            <input type="text" id="searchInput" placeholder="SEARCH VEHICLES..." onkeyup="searchCars()">
        </div>
    </div>
    <div class="stats-bar"> <span id="carCount">0</span> VEHICLES AVAILABLE</div>
    <div id="carsContainer"></div>
    <button id="scrollTopBtn" type="button" onclick="scrollToTop()">↑</button>
</main>

<div id="carDetailModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeCarModal()">&times;</span>
        <img id="modalImg" class="modal-img" src="../image/placeholder.jpg" alt="Car image">
        <h2 id="modalName" class="modal-title">Car Name</h2>
        <div class="modal-specs">
            <div class="modal-spec-item">Category: <strong id="modalCategory"></strong></div>
            <div class="modal-spec-item">Seats: <strong id="modalSeats"></strong></div>
            <div class="modal-spec-item">Transmission: <strong id="modalTransmission"></strong></div>
            <div class="modal-spec-item">Year: <strong id="modalYear"></strong></div>
            <div class="modal-spec-item">Horsepower: <strong id="modalHorsepower"></strong> HP</div>
            <div class="modal-spec-item">Engine: <strong id="modalEngine"></strong></div>
            <div class="modal-spec-item">Stock: <strong id="modalStock"></strong></div>
        </div>
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-buttons" id="modalButtons"></div>
    </div>
</div>

<footer class="site-footer">
    <div class="footer-content">
        <div class="footer-section"><h3>TOKYO DRIFT</h3><p>Your ultimate destination for JDM legends.</p></div>
        <div class="footer-section"><h3>QUICK LINKS</h3><a href="../index.html">HOME</a><a href="products.html">CARS</a><a href="about.html">ABOUT</a><a href="booking.html">BOOKING</a></div>
        <div class="footer-section">
            <h3>FOLLOW US</h3>
            <div class="social-icons">
                <a href="#" class="social-icon" aria-label="Facebook"><img src="../image/facebook.jpg" alt="Facebook"></a>
                <a href="#" class="social-icon" aria-label="Twitter"><img src="../image/twitter.jpg" alt="Twitter"></a>
                <a href="#" class="social-icon" aria-label="Instagram"><img src="../image/instagram.jpg" alt="Instagram"></a>
            </div>
        </div>
        <div class="footer-section"><h3>NEWSLETTER</h3><div class="newsletter-form"><input type="email" placeholder="Your email"><button type="button">SUBSCRIBE</button></div></div>
    </div>
    <div class="footer-bottom"><p id="copyrightYear"></p></div>
</footer>

<script src="../javascript/database.js"></script>
<script src="../javascript/Script.js"></script>
<script src="../javascript/products_inline.js"></script>
</body>
</html>
