<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tokyo Drift - Book a Test Drive</title>
    <link rel="icon" type="image/png" href="../image/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&amp;family=Condiment&amp;family=Black+Ops+One&amp;family=Metal+Mania&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/booking_inline.css">
</head>
<body>

<video autoplay loop muted playsinline class="video-background">
    <source src="../video/background-vid.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>

<audio id="bgMusic" preload="auto" autoplay></audio>
<div class="music-player" id="musicPlayer">
    <button id="musicPrevBtn" type="button">⏮</button>
    <button id="musicPlayBtn" type="button">🔊</button>
    <button id="musicNextBtn" type="button">⏭</button>
    <div><span id="currentSong">Imagine Dragons - Natural</span></div>
</div>

<button class="back-btn" type="button" onclick="goBack()">← BACK</button>

<header class="compact-header">
    <div class="header-top">
        <div class="logo"><img src="../image/logo.png" alt="Tokyo Drift Logo" class="logo-icon"><h1>TOKYO DRIFT</h1></div>
        <button class="mobile-menu-btn" type="button" onclick="toggleMobileMenu()">☰</button>
    </div>
    <nav class="compact-nav" id="mainNav"></nav>
</header>

<main class="booking-container" id="bookingMainContent"></main>

<footer class="site-footer">
    <div class="footer-content">
        <div class="footer-section"><h2>TOKYO DRIFT</h2><p>Drift your dreams.</p></div>
        <div class="footer-section"><h2>LINKS</h2><a href="../index.html">HOME</a><a href="products.html">CARS</a><a href="about.html">ABOUT</a><a href="booking.html">BOOKING</a></div>
        <div class="footer-section"><h2>FOLLOW US</h2><div class="social-icons"><a href="#" class="social-icon" aria-label="Facebook"><img src="../image/facebook.jpg" alt="Facebook"></a><a href="#" class="social-icon" aria-label="Twitter"><img src="../image/twitter.jpg" alt="Twitter"></a><a href="#" class="social-icon" aria-label="Instagram"><img src="../image/instagram.jpg" alt="Instagram"></a></div></div>
        <div class="footer-section"><h2>NEWSLETTER</h2><div class="newsletter-form"><input type="email" placeholder="Your email"><button type="button">SUBSCRIBE</button></div></div>
    </div>
    <div class="footer-bottom"><p id="copyrightYear"></p></div>
</footer>

<script src="../javascript/database.js"></script>
<script src="../javascript/Script.js"></script>
<script src="../javascript/booking_inline.js"></script>
</body>
</html>
