<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokyo Drift - Reset Password</title>
    <link rel="icon" type="image/png" href="../image/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&amp;family=Condiment&amp;family=Black+Ops+One&amp;family=Metal+Mania&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/reset-password_inline.css">
</head>
<body>

<video autoplay loop muted playsinline class="video-background">
    <source src="../video/background-vid.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>

<audio id="bgMusic" preload="auto" autoplay></audio>
<div class="music-player" id="musicPlayer">
    <button id="musicPrevBtn" type="button">⏮</button>
    <button id="musicPlayBtn" type="button">🔊</button>
    <button id="musicNextBtn" type="button">⏭</button>
    <div><span id="currentSong">Imagine Dragons - Natural</span></div>
</div>

<button class="back-btn" type="button" onclick="goBack()">← BACK</button>

<div class="reset-container">
    <div class="reset-card">
        <div class="reset-header">
            <h1>RESET PASSWORD</h1>
            <p>Enter your new password below</p>
        </div>
        <form id="resetForm" onsubmit="return resetPassword(event)">
            <div class="input-group">
                <label>NEW PASSWORD</label>
                <input type="password" id="newPassword" required onkeyup="checkStrength()">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="input-group">
                <label>CONFIRM NEW PASSWORD</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit" class="reset-btn">RESET PASSWORD</button>
        </form>
        <div class="auth-link" style="text-align:center; margin-top:20px;">
            <p><a href="login.html" style="background: linear-gradient(135deg, #9b30ff, #ff2b6d); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none;">← BACK TO LOGIN</a></p>
        </div>
    </div>
</div>

<script src="../javascript/database.js"></script>
<script src="../javascript/Script.js"></script>
<script src="../javascript/reset-password_inline.js"></script>
</body>
</html>
