<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokyo Drift - My Orders</title>
    <link rel="icon" type="image/png" href="../image/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Condiment&family=Black+Ops+One&family=Metal+Mania&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/orders_inline.css">
</head>
<body>

<div id="loader">
    <video autoplay loop muted playsinline class="loader-video">
        <source src="../video/loader-bg.mp4" type="video/mp4">
    </video>
    <div class="loader-content">
        <div class="wheel-spinner"></div>
        <h1>🏎️ TOKYO DRIFT</h1>
        <p>Loading showroom...</p>
    </div>
</div>

<video autoplay loop muted playsinline class="video-background"><source src="../video/background-vid.mp4"></video>
<div class="video-overlay"></div>

<audio id="bgMusic" preload="auto" autoplay></audio>
<div class="music-player" id="musicPlayer">
    <button id="musicPrevBtn">⏮</button>
    <button id="musicPlayBtn">🔊</button>
    <button id="musicNextBtn">⏭</button>
    <div><span id="currentSong">Imagine Dragons - Natural</span></div>
</div>

<button class="back-btn" onclick="goBack()">← BACK</button>

<header class="compact-header">
    <div class="header-top">
        <div class="logo">
            <img src="../image/logo.png" alt="TOKYO DRIFT" class="logo-icon" onerror="this.src='https://placehold.co/55x55/9b30ff/white?text=TD'">
            <h1>TOKYO DRIFT</h1>
        </div>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
    </div>
    <nav class="compact-nav" id="mainNav"></nav>
</header>

<div class="orders-container">
    <div class="orders-section">
        <h2 class="section-title">MY ORDERS</h2>
        <div class="table-responsive">
            <table class="orders-table">
                <thead><tr><th>ORDER ID</th><th>CAR</th><th>ORIGINAL PRICE</th><th>DISCOUNT</th><th>TOTAL</th><th>DATE</th><th>STATUS</th></tr></thead>
                <tbody id="userOrdersList"><tr><td colspan="7">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<footer class="site-footer"><div class="footer-bottom"><p id="copyrightYear"></p></div></footer>

<script src="javascript/error_filter.js"></script>
<script src="javascript/music.js"></script>
<script src="../javascript/database.js"></script>
<script src="../javascript/orders_inline.js"></script>
</body>
</html>
