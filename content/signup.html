<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokyo Drift - Sign Up</title>
    <link rel="icon" type="image/png" href="../image/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&amp;family=Condiment&amp;family=Black+Ops+One&amp;family=Metal+Mania&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/signup_inline.css">
</head>
<body>

<video autoplay loop muted playsinline class="video-background">
    <source src="../video/background-vid.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>

<audio id="bgMusic" preload="auto" autoplay></audio>
<div class="music-player" id="musicPlayer">
    <button id="musicPrevBtn" type="button">⏮</button>
    <button id="musicPlayBtn" type="button">🔊</button>
    <button id="musicNextBtn" type="button">⏭</button>
    <div><span id="currentSong">Imagine Dragons - Natural</span></div>
</div>

<button class="back-btn" type="button" onclick="goBack()">← BACK</button>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>CREATE ACCOUNT</h1>
            <p>JOIN THE DRIFT COMMUNITY</p>
        </div>
        <form id="signupForm">
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="username" required>
            </div>
            <div class="input-group">
                <label>EMAIL</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" required onkeyup="checkStrength()">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="input-group">
                <label>CONFIRM PASSWORD</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit" class="auth-btn">CREATE ACCOUNT →</button>
        </form>
        <div class="auth-link">
            <p>ALREADY HAVE AN ACCOUNT? <a href="login.html">SIGN IN →</a></p>
        </div>
    </div>
</div>

<script src="../javascript/database.js"></script>
<script src="../javascript/Script.js"></script>
<script src="../javascript/signup_inline.js"></script>
</body>
</html>
