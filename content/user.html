<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokyo Drift - My Account</title>
    <link rel="icon" type="image/png" href="../image/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&amp;family=Condiment&amp;family=Black+Ops+One&amp;family=Metal+Mania&amp;family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/user_inline.css">
</head>
<body>

<video autoplay loop muted playsinline class="video-background">
    <source src="../video/background-vid.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>

<audio id="bgMusic" preload="auto" autoplay></audio>
<div class="music-player" id="musicPlayer">
    <button id="musicPrevBtn" type="button">⏮</button>
    <button id="musicPlayBtn" type="button">🔊</button>
    <button id="musicNextBtn" type="button">⏭</button>
    <div><span id="currentSong">Imagine Dragons - Natural</span></div>
</div>

<button class="back-btn" type="button" onclick="goBack()">← BACK</button>

<header class="compact-header">
    <div class="header-top">
        <div class="logo"><img src="../image/logo.png" alt="Tokyo Drift Logo" class="logo-icon"><h1>TOKYO DRIFT</h1></div>
        <button class="mobile-menu-btn" type="button" onclick="toggleMobileMenu()">☰</button>
    </div>
    <nav class="compact-nav" id="mainNav"></nav>
</header>

<main class="user-container">
    <div class="profile-section">
        <h2 class="section-title">MY PROFILE</h2>
        <div class="profile-info">
            <div class="info-group"><label>USERNAME</label><p id="displayUsername"></p><input type="text" id="editUsername" style="display:none;"></div>
            <div class="info-group"><label>EMAIL</label><p id="displayEmail"></p><input type="email" id="editEmail" style="display:none;"></div>
        </div>
        <button class="edit-btn" id="editProfileBtn" onclick="enableEdit()">EDIT PROFILE</button>
        <button class="save-btn" id="saveProfileBtn" onclick="saveProfile()" style="display:none;">SAVE CHANGES</button>
    </div>

    <div class="orders-section">
        <h2 class="section-title">MY ORDERS</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ORDER ID</th><th>CAR</th><th>ORIGINAL PRICE</th><th>DISCOUNT</th><th>TOTAL</th><th>DATE</th><th>STATUS</th><th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="userOrdersList">
                    <tr><td colspan="8">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="bookings-section">
        <h2 class="section-title">MY BOOKINGS (TEST DRIVES)</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>BOOKING ID</th><th>CAR</th><th>DATE</th><th>TIME</th><th>DEPOSIT</th><th>STATUS</th><th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="userBookingsList">
                    <tr><td colspan="7">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer class="site-footer"><div class="footer-bottom"><p id="copyrightYear"></p></div></footer>

<script src="../javascript/database.js"></script>
<script src="../javascript/Script.js"></script>
<script src="../javascript/user_inline.js"></script>
</body>
</html>
