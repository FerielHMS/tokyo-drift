<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokyo Drift - Login</title>
    <link rel="icon" type="image/png" href="../image/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&amp;family=Condiment&amp;family=Black+Ops+One&amp;family=Metal+Mania&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/login_inline.css">
</head>
<body>

<video autoplay loop muted playsinline class="video-background">
    <source src="../video/background-vid.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>

<audio id="bgMusic" preload="auto"></audio>
<div class="music-player" id="musicPlayer">
    <button id="musicPrevBtn" type="button">⏮</button>
    <button id="musicPlayBtn" type="button">🔊</button>
    <button id="musicNextBtn" type="button">⏭</button>
    <div><span id="currentSong">Imagine Dragons - Natural</span></div>
</div>

<button class="back-btn" type="button" onclick="goBack()">← BACK</button>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>WELCOME BACK</h1>
            <p>SIGN IN TO ACCESS</p>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <label>EMAIL</label>
                <input type="email" id="loginEmail" placeholder="admin@tokyodrift.com" required>
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="loginPassword" placeholder="••••••" required>
            </div>
            <div class="forgot-password">
                <a href="#" onclick="openForgotModal(event)">FORGOT PASSWORD?</a>
            </div>
            <button type="submit" class="auth-btn">SIGN IN →</button>
        </form>
        <div class="auth-link">
            <p>NO ACCOUNT? <a href="signup.html">CREATE ONE →</a></p>
        </div>
        <div class="auth-link" style="margin-top:10px">
            <p style="color:#888;">DEMO: admin@tokyodrift.com / admin123<br>WORKER: worker@tokyodrift.com / worker123</p>
        </div>
    </div>
</div>

<div id="forgotModal" class="forgot-modal">
    <div class="forgot-modal-content">
        <h2>RESET PASSWORD</h2>
        <p>Enter your email address and we will send you a password reset link</p>
        <input type="email" id="resetEmail" placeholder="Your email address">
        <div class="forgot-buttons">
            <button class="send-btn" type="button" onclick="sendResetLink()">SEND RESET LINK</button>
            <button class="cancel-btn" type="button" onclick="closeForgotModal()">CANCEL</button>
        </div>
    </div>
</div>

<script src="../javascript/database.js"></script>
<script src="../javascript/Script.js"></script>
<script src="../javascript/login_inline.js"></script>
</body>
</html>
